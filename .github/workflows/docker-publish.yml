name: Docker Image CI/CD

on:
  push:
    branches: [ "main" ] # Trigger bei Push auf den main-Branch
    tags: [ "v*.*.*" ]   # Trigger bei Push von Tags wie v1.0.0, v1.0.0-beta, etc.
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Notwendige Rechte für das Schreiben in die Registry und die Signierung
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Verbessertes Caching für schnellere Builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatisches Tagging (branch, sha, latest)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}         # Extrahiert die vollständige semantische Version (z.B. 1.0.0 von v1.0.0)
            type=semver,pattern={{major}}           # Extrahiert die Hauptversion (z.B. 1 von v1.0.0)
            type=semver,pattern={{major}}.{{minor}} # Extrahiert Haupt- und Nebenversion (z.B. 1.0 von v1.0.0)
            type=ref,event=branch                   # Taggt mit dem Branch-Namen (z.B. main)
            type=sha,format=short                   # Taggt mit dem kurzen Commit-SHA (z.B. sha-abcdefg)
            type=raw,value=latest,enable={{is_default_branch}} # Taggt als latest für den Standard-Branch

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Herkunftsnachweis (nur beim Push auf main)
      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
