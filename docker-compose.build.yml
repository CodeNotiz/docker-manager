version: '3.8'

services:
  docker-manager:
    build: .
    container_name: docker-manager
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount the Docker socket so the app can manage the host's Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Data directory for SQLite DB (User Logins)
      - docker-manager-data:/app/data
      # Stacks directory for docker-compose generated by the UI
      - docker-manager-stacks:/app/stacks_data
    environment:
      - NODE_ENV=production
      # - LOG_LEVEL=INFO   # DEBUG | INFO | WARN | ERROR | SILENT (default: INFO)
      # - COOKIE_SECURE=false  # Set to 'true' only if running behind HTTPS/reverse proxy

volumes:
  docker-manager-data:
  docker-manager-stacks:
